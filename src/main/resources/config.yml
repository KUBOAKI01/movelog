# PlayerMoveLog 配置文件
# 修改后使用 /movelog reload 重新加载（所有配置项均支持热重载）

# 是否启用记录（默认开启）
enabled: true

# 记录间隔（单位：游戏刻，1200 = 60秒 = 1分钟）
record-interval-ticks: 1200

# TPS 阈值 — 当服务器 1 分钟平均 TPS 低于此值时自动跳过本次记录
# 设为 0 可禁用 TPS 检测
tps-threshold: 18.0

# 日志写入缓冲区大小（字节）
buffer-size: 8192

# 大型服务器分批写入 — 玩家数超过此阈值时启用分批写入
batch-threshold: 100

# 每批写入的玩家记录数
batch-size: 50

# 日志文件切分间隔（小时），默认 4。取值必须能被 24 整除（1, 2, 3, 4, 6, 8, 12, 24）
# 设为 4 → 每 4 小时一个文件；设为 24 → 按天分文件
rotation-hours: 4

# 时区（日志时间戳时区，默认 Asia/Shanghai = 北京时间 UTC+8）
timezone: Asia/Shanghai

# 日期格式（用于日志文件名中的日期部分）
date-format: yyyy-MM-dd

# 时间格式（用于日志行内时间戳，精确到秒）
time-format: yyyy-MM-dd HH:mm:ss

# 输出目录名（位于服务器根目录下，与 world 同级）
# 不能包含 .. / \ 等路径穿越字符
output-dir: movelog

# 日志保留天数（-1 = 永久保留，0 = 不保留，>0 = 保留最近 N 天）
# 每天首次记录时自动清理过期文件
log-retention-days: 30

# Excel UTF-8 BOM 兼容（开启后新文件头部写入 BOM，Excel 打开中文不乱码）
# 注意：BOM 可能影响部分 Linux 解析工具
excel-bom: false

# 空手时显示的文本（可改为 "empty"、"none"、"AIR" 等）
item-empty-text: "空"

# 是否记录背包内容（默认关闭）
# 开启后日志行末尾追加 INV:item1:count1,item2:count2 ... 统计所有非空槽位
# 覆盖 36 主背包 + 副手 + 4 护甲，相同物品自动合并计数
# 15 人在线时日均增加约 15 MB 日志体积
log-inventory: false

# 连续 I/O 失败多少次后暂停对该文件块的写入（防止磁盘满时死循环）
max-consecutive-failures: 3

# 查询命令 (/movelog search) 每页返回的行数
search-lines: 20

# ─── 事件记录 ──────────────────────────────────────

event-logging:
  # 是否启用事件驱动记录
  # 开启后会在玩家加入/退出/死亡/跨世界切换时立即记录
  enabled: true

# ─── 过滤系统 ─────────────────────────────────────

filter:
  # 权限豁免：拥有此权限节点的玩家不会被记录
  # 例：exempt-permission: "movelog.exempt"
  exempt-permission: ""

  # 世界白名单（非空时只记录这些世界中的玩家）
  # 例：world-whitelist: ["world", "world_nether"]
  world-whitelist: []

  # 世界黑名单（不记录这些世界中的玩家，优先于白名单）
  # 例：world-blacklist: ["minigame_world"]
  world-blacklist: []

  # 排除的玩家名
  # 例：excluded-players: ["AdminBot"]
  excluded-players: []

  # 包含的玩家名（非空时只记录这些玩家，优先级最高）
  # 例：included-players: ["Steve", "Alex"]
  included-players: []

# ─── 聊天记录 ─────────────────────────────────────

chat-logging:
  # 是否启用聊天记录（默认关闭）
  # 开启后所有玩家发言写入 chatlog/ 目录，与 movelog/ 同级
  enabled: false

  # 聊天日志输出目录名（位于服务器根目录下）
  output-dir: chatlog

  # 聊天日志切分间隔（小时），默认跟随主 rotation-hours
  rotation-hours: 4
