name: PlayerMoveLog
version: 2.0.0
main: com.proma.movelog.PlayerMoveLog
api-version: "1.21"
description: 玩家移动轨迹记录工具 — 定时+事件驱动，过滤系统，查询命令，TPS保护
author: Proma
website: https://github.com/KUBOAKI01/movelog

commands:
  movelog:
    description: 控制玩家移动轨迹记录插件
    usage: /movelog <on|off|reload|status>
    permission: movelog.admin
    aliases: [mlog]

permissions:
  movelog.admin:
    description: 允许使用 /movelog 命令管理记录功能
    default: op
